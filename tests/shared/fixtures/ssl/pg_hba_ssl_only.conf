# pg_hba.conf for SSL-required postgres testcontainer (fetcher-012 e2e).
# Plaintext network connections are rejected; only TLS-wrapped traffic accepted.
# The local socket and loopback stay trusted so the entrypoint init scripts work.

# local socket (used by the entrypoint's init scripts)
local   all all                   trust
# loopback (entrypoint's healthcheck)
host    all all 127.0.0.1/32      trust
host    all all ::1/128           trust
# Reject plaintext from network — only TLS-wrapped traffic allowed.
# Use scram-sha-256 because postgres 16-alpine defaults
# password_encryption=scram-sha-256, so md5 here makes hostssl auth fail with
# "password authentication failed" even when TLS negotiates.
hostssl all all 0.0.0.0/0         scram-sha-256
hostssl all all ::/0              scram-sha-256
