name: "Go Combined Analysis"

on:
  pull_request:
    branches:
      - develop
      - release-candidate
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.gitignore'
      - '.editorconfig'
      - '*.png'
      - '*.jpg'
      - '*.svg'

jobs:
  go-analysis:
    name: Go Analysis
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/go-pr-analysis.yml@feature/go-workflows
    with:
      # Single go.mod at root - run as single app
      app_name_prefix: "fetcher"
      go_version: "1.23"
      golangci_lint_version: "v2.6.2"
      golangci_lint_args: "--timeout=5m"
      coverage_threshold: 85
      fail_on_coverage_threshold: false
      enable_lint: true
      enable_security: true
      enable_tests: true
      enable_coverage: true
      enable_build: true
      go_private_modules: "github.com/LerianStudio/*"
    secrets: inherit
