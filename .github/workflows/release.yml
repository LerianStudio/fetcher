name: Release

on:
  push:
    branches:
      - develop
      - release-candidate
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/release.yml@v1.3.3
    with:
      runner_type: "firmino-lxc-runners"
    secrets: inherit
