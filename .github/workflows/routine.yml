name: Repository Routines

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  routine:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/routine.yml@v1.36.5
    with:
      routine: branch-cleanup-stale
      dry_run: false
      merged_branch: ${{ github.head_ref }}
    secrets: inherit
