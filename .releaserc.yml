# semantic-release manages the PARENT module (github.com/LerianStudio/fetcher/v2),
# tagged v${version}. The engine submodule (github.com/LerianStudio/fetcher/pkg/engine,
# tagged pkg/engine/vX.Y.Z) is cut in the SAME run by the @semantic-release/exec prepare
# hook BEFORE @semantic-release/git makes the release commit — engine first, so the
# parent's pinned require is always resolvable. See docs/RELEASING.md.

# Parent tag format. Path-prefixed engine tags (pkg/engine/v*) do not match this glob,
# so semantic-release never mistakes an engine tag for a parent release (req: no collision).
tagFormat: "v${version}"

plugins:
  - path: "@semantic-release/commit-analyzer"
    preset: conventionalcommits
    parserOpts:
      noteKeywords:
        - "BREAKING CHANGE"
        - "BREAKING CHANGES"
    releaseRules:
      - type: feat
        release: minor
      - type: perf
        release: minor
      - type: build
        release: minor
      - type: chore
        release: patch
      - type: ci
        release: patch
      - type: test
        release: patch
      - type: fix
        release: patch # to hotfix scenarios
      - type: refactor
        release: minor
      - type: docs
        release: patch
      - breaking: true
        release: major

  # Engine-first: cut + push pkg/engine/vX.Y.Z, pin the parent require to it, drop the
  # transient replace, and run the GOWORK=off resolution gate — all BEFORE the parent
  # release commit. MUST be listed before @semantic-release/git so its prepare runs first.
  - path: "@semantic-release/exec"
    prepareCmd: "node scripts/release/engine-release.mjs prepare --parent-version ${nextRelease.version} --channel ${nextRelease.channel}"

  # Plugin to version the CHANGELOG.md and carry the engine require-pin into the release
  # commit. go.mod/go.sum/pkg/engine/CHANGELOG.md are written by the exec prepare hook above.
  - path: "@semantic-release/git"
    assets:
      - CHANGELOG.md
      - go.mod
      - go.sum
      - pkg/engine/CHANGELOG.md
    message: "chore(release): ${nextRelease.version}\n\nChangelog atualizado."

  # Plugin to publish the CHANGELOG.md as an asset in the GitHub release
  - path: "@semantic-release/github"
    assets:
      - path: CHANGELOG.md
        label: "Changelog"
    successComment: false
    failComment: false
    labels: []
