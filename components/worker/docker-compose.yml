services:
  fetcher-worker:
    container_name: fetcher-worker
    restart: always
    build:
      context: ../../
      dockerfile: ./components/worker/Dockerfile
      secrets:
        - github_token
    env_file:
      - .env
    volumes:
      - .:/usr/src/worker
    networks:
      - fetcher-infra-network
      - infra-network
      - plugin-crm-network

networks:
  fetcher-infra-network:
    external: true
  infra-network:
    external: true
  plugin-crm-network:
    external: true

secrets:
  github_token:
    file: ../../.secrets/github_token.txt