services:
  fetcher-worker:
    container_name: fetcher-worker
    restart: always
    build:
      context: ../../
      dockerfile: ./components/worker/Dockerfile
      secrets:
        - github_token
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - fetcher-infra-network

networks:
  fetcher-infra-network:
    external: true

secrets:
  github_token:
    file: ../../.secrets/github_token.txt
