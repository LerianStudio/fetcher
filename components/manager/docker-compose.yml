services:
  fetcher-manager:
    container_name: fetcher-manager
    restart: always
    build:
      context: ../../
      dockerfile: ./components/manager/Dockerfile
      secrets:
        - github_token
    env_file:
      - .env
    environment:
      - SEAWEEDFS_HOST=${SEAWEEDFS_HOST}
      - SEAWEEDFS_FILER_PORT=${SEAWEEDFS_FILER_PORT}
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVER_PORT}/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      fetcher-mongodb:
        condition: service_healthy
      fetcher-valkey:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - fetcher-infra-network
      - fetcher-manager-network

networks:
  fetcher-infra-network:
    external: true
  fetcher-manager-network:
    driver: bridge

secrets:
  github_token:
    file: ../../.secrets/github_token.txt
