    - name
    type: object
  github_com_LerianStudio_fetcher_pkg_model.ProductResponse:
    properties:
      code:
        type: string
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      name:
        type: string
      updatedAt:
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model.ProductUpdateInput:
    properties:
      description:
        example: Reporting product
        maxLength: 500
        type: string
      metadata:
        additionalProperties: {}
        type: object
      name:
        example: Reporter
        maxLength: 100
        minLength: 1
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model.SSLInput:
    properties:
      ca:
        example: |-
          -----BEGIN CERTIFICATE-----
          ...
        type: string
      cert:
        type: string
      key:
        type: string
      mode:
        example: require
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model.SSLResponse:
    properties:
      mode:
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model.SSLUpdateInput:
    properties:
      ca:
        example: |-
          -----BEGIN CERTIFICATE-----
          ...
        type: string
      cert:
        type: string
      key:
        type: string
      mode:
        example: require
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model.SchemaValidationError:
    properties:
      dataSourceId:
        type: string
      field:
        type: string
      table:
        type: string
      type:
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model.SchemaValidationRequest:
    description: Request body for schema validation containing mapped fields per datasource.
    properties:
      mappedFields:
        additionalProperties:
          additionalProperties:
            items:
              type: string
            type: array
          type: object
        description: |-
          MappedFields maps datasource config names to their tables and fields
          Key: configName (e.g., "midaz_onboarding")
          Value: map of table names to field names
        type: object
    required:
    - mappedFields
    type: object
  github_com_LerianStudio_fetcher_pkg_model.SchemaValidationResponse:
    properties:
      errors:
        items:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.SchemaValidationError'
        type: array
      message:
        type: string
      status:
        description: '"success" or "failure"'
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model_job.FilterCondition:
    properties:
      between:
        description: |-
          Between specifies a range condition with exactly two values [min, max].
          Matches records where min <= field <= max
          Example: {"between": [100, 1000]} matches records where 100 <= field <= 1000
        items: {}
        type: array
      eq:
        description: |-
          Equals specifies exact value matches. Multiple values treated as OR conditions.
          Example: {"eq": ["active", "pending"]} matches records where field equals "active" OR "pending"
        items: {}
        type: array
      gt:
        description: |-
          GreaterThan specifies values that must be greater than the provided value.
          Should contain exactly one value for comparison.
          Example: {"gt": [100]} matches records where field > 100
        items: {}
        type: array
      gte:
        description: |-
          GreaterOrEqual specifies values that must be greater than or equal to the provided value.
          Should contain exactly one value for comparison.
          Example: {"gte": ["2025-06-01"]} matches records where field >= "2025-06-01"
        items: {}
        type: array
      in:
        description: |-
          In specifies a list of values where the field must match any one of them.
          Multiple values treated as OR conditions.
          Example: {"in": ["active", "pending", "suspended"]} matches any of these statuses
        items: {}
        type: array
      like:
        description: |-
          Like specifies values that must match the provided value using LIKE pattern matching.
          Should contain exactly one value for comparison.
          Example: {"like": ["%active%"]} matches any status containing "active"
        items: {}
        type: array
      lt:
        description: |-
          LessThan specifies values that must be less than the provided value.
          Should contain exactly one value for comparison.
          Example: {"lt": [1000]} matches records where field < 1000
        items: {}
        type: array
      lte:
        description: |-
          LessOrEqual specifies values that must be less than or equal to the provided value.
          Should contain exactly one value for comparison.
          Example: {"lte": ["2025-06-30"]} matches records where field <= "2025-06-30"
        items: {}
        type: array
      ne:
        description: |-
          NotEquals specifies values that must NOT match the provided value.
          Should contain exactly one value for comparison.
          Example: {"ne": ["active"]} excludes this status
        items: {}
        type: array
      nin:
        description: |-
          NotIn specifies a list of values where the field must NOT match any of them.
          Multiple values treated as AND NOT conditions.
          Example: {"nin": ["deleted", "archived"]} excludes these statuses
        items: {}
        type: array
    type: object
  pkg.HTTPError:
    properties:
      code:
        type: string
      entityType:
        type: string
      err: {}
      message:
        type: string
      title:
        type: string
    type: object
host: localhost:4006
info:
  contact: {}
  description: API documentation for the Fetcher Manager component
  termsOfService: http://swagger.io/terms/
  title: Fetcher Manager API
  version: 1.0.0
paths:
  /v1/fetcher:
    post:
      consumes:
      - application/json
      description: Create a new data extraction job. The request will be validated,
        deduplicated within a 5-minute window, and all referenced connections will
        be tested before job creation. The metadata.source field is required for product
        isolation and datasource ownership validation.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Fetcher request payload. metadata.source is required.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.FetcherRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Duplicate request - returning existing job
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.FetcherResponse'
        "202":
          description: Job created and queued for processing
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.FetcherResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Create fetcher job
      tags:
      - Fetcher
  /v1/fetcher/{id}:
    get:
      description: Retrieve detailed information about a specific data extraction
        job.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.JobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Get fetcher job
      tags:
      - Fetcher
  /v1/management/connections:
    get:
      description: List connections with pagination and filters. When X-Product-Id
        is provided, returns only connections associated with that product.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Product ID (UUID). When provided, filters connections by product.
        in: header
        name: X-Product-Id
        type: string
      - default: 1
        description: Page number (minimum 1)
        in: query
        name: page
        type: integer
      - default: 50
        description: Page size (default 50, max 1000)
        in: query
        name: limit
        type: integer
      - default: desc
        description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: sortOrder
        type: string
      - description: Filter by database type
        enum:
        - ORACLE
        - SQL_SERVER
        - POSTGRESQL
        - MONGODB
        - MYSQL
        in: query
        name: type
        type: string
      - description: Filter by host
        in: query
        name: host
        type: string
      - description: Filter by database name
        in: query
        name: databaseName
        type: string
      - description: Filter by start date (YYYY-MM-DD)
        in: query
        name: startDate
        type: string
      - description: Filter by end date (YYYY-MM-DD)
        in: query
        name: endDate
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/Pagination'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.ConnectionResponse'
                  type: array
                limit:
                  type: integer
                page:
                  type: integer
                total:
                  type: integer
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: List connections
      tags:
      - Connections
    post:
      consumes:
      - application/json
      description: Create a new database connection for the organization. Optionally
        associate it with a product via productId. ConfigName must be unique per organization
        (and per product when assigned); password is encrypted and a UUID is generated
        on creation.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Connection payload
        in: body
        name: connection
        required: true
        schema:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.ConnectionInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created connection identifier
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Create connection
      tags:
      - Connections
  /v1/management/connections/{id}:
    delete:
      description: Soft delete a connection when no active jobs are running for it.
        Returns 409 if there is any active job.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Connection ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Delete connection
      tags:
      - Connections
    get:
      description: Get connection details by ID for the given organization.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Connection ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.ConnectionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Get connection
      tags:
      - Connections
    patch:
      consumes:
      - application/json
      description: Apply a partial update to a connection. Only include fields you
        want to change. Returns 409 if there is any active job.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Connection ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update (only include fields you want to change)
        in: body
        name: connection
        required: true
        schema:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.ConnectionUpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.ConnectionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Update connection
      tags:
      - Connections
  /v1/management/connections/{id}/assign:
    post:
      consumes:
      - application/json
      description: Associate an unassigned connection to a product. This is a one-time,
        irreversible operation for migration purposes. The productId must be provided
        in the request body.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Connection ID
        in: path
        name: id
        required: true
        type: string
      - description: Assignment payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.AssignConnectionInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.ConnectionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Assign connection to product
      tags:
      - Migration
  /v1/management/connections/{id}/test:
    post:
      description: Test the configured connection by establishing and closing a connection.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Connection ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Connection test result
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Test connection
      tags:
      - Connections
  /v1/management/connections/unassigned:
    get:
      description: List connections that have no product assigned, useful for migration
        purposes.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - default: 1
        description: Page number (minimum 1)
        in: query
        name: page
        type: integer
      - default: 50
        description: Page size (default 50, max 1000)
        in: query
        name: limit
        type: integer
      - default: desc
        description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: sortOrder
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/Pagination'
            - properties:
