basePath: /
definitions:
  Pagination:
    description: Pagination is the struct designed to store the pagination data of
      an entity list.
    properties:
      items: {}
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 10
        type: integer
    type: object
  github_com_LerianStudio_fetcher_pkg_model.ConnectionInput:
    properties:
      configName:
        example: production-db
        maxLength: 100
        minLength: 3
        type: string
      databaseName:
        example: mydatabase
        type: string
      host:
        example: db.example.com
        type: string
      password:
        example: secretpassword
        type: string
      port:
        example: 5432
        maximum: 65535
        minimum: 1
        type: integer
      ssl:
        $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.SSLInput'
      type:
        enum:
        - ORACLE
        - SQL_SERVER
        - POSTGRESQL
        - MONGODB
        - MYSQL
        example: POSTGRESQL
        type: string
      username:
        example: dbuser
        type: string
    required:
    - configName
    - databaseName
    - host
    - password
    - port
    - type
    - username
    type: object
  github_com_LerianStudio_fetcher_pkg_model.ConnectionResponse:
    properties:
      configName:
        type: string
      createdAt:
        type: string
      databaseName:
        type: string
      host:
        type: string
      id:
        type: string
      port:
        type: integer
      ssl:
        $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.SSLResponse'
      type:
        type: string
      updatedAt:
        type: string
      username:
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model.DataRequest:
    description: DataRequest encapsulates field mappings and optional filters for
      data extraction.
    properties:
      filters:
        items:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.FilterRequest'
        type: array
      mappedFields:
        additionalProperties:
          additionalProperties:
            items:
              type: string
            type: array
          type: object
        type: object
    required:
    - mappedFields
    type: object
  github_com_LerianStudio_fetcher_pkg_model.FetcherRequest:
    description: FetcherRequest represents the request body for creating a new data
      extraction job.
    properties:
      dataRequest:
        $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.DataRequest'
      metadata:
        additionalProperties: {}
        type: object
    required:
    - dataRequest
    type: object
  github_com_LerianStudio_fetcher_pkg_model.FetcherResponse:
    description: FetcherResponse represents the response after successfully creating
      a data extraction job.
    properties:
      createdAt:
        type: string
      jobId:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model.Filter:
    properties:
      field:
        type: string
      operator:
        type: string
      value:
        items: {}
        type: array
    required:
    - field
    - operator
    - value
    type: object
  github_com_LerianStudio_fetcher_pkg_model.FilterRequest:
    description: FilterRequest defines a filter condition with field, operator, and
      value(s).
    properties:
      field:
        type: string
      operator:
        type: string
      value:
        items: {}
        type: array
    required:
    - field
    - operator
    - value
    type: object
  github_com_LerianStudio_fetcher_pkg_model.JobResponse:
    description: JobResponse represents the complete information about a data extraction
      job.
    properties:
      completedAt:
        type: string
      createdAt:
        type: string
      filters:
        items:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.Filter'
        type: array
      id:
        type: string
      mappedFields:
        additionalProperties:
          additionalProperties:
            items:
              type: string
            type: array
          type: object
        type: object
      metadata:
        additionalProperties: {}
        type: object
      organizationId:
        type: string
      requestHash:
        type: string
      resultPath:
        type: string
      status:
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model.SSLInput:
    properties:
      ca:
        example: |-
          -----BEGIN CERTIFICATE-----
          ...
        type: string
      cert:
        type: string
      key:
        type: string
      mode:
        example: require
        type: string
    required:
    - mode
    type: object
  github_com_LerianStudio_fetcher_pkg_model.SSLResponse:
    properties:
      mode:
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model.SchemaValidationError:
    properties:
      dataSourceId:
        type: string
      field:
        type: string
      table:
        type: string
      type:
        type: string
    type: object
  github_com_LerianStudio_fetcher_pkg_model.SchemaValidationRequest:
    description: Request body for schema validation containing mapped fields per datasource.
    properties:
      mappedFields:
        additionalProperties:
          additionalProperties:
            items:
              type: string
            type: array
          type: object
        description: |-
          MappedFields maps datasource config names to their tables and fields
          Key: configName (e.g., "midaz_onboarding")
          Value: map of table names to field names
        type: object
    required:
    - mappedFields
    type: object
  github_com_LerianStudio_fetcher_pkg_model.SchemaValidationResponse:
    properties:
      errors:
        items:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.SchemaValidationError'
        type: array
      message:
        type: string
      status:
        description: '"success" or "failure"'
        type: string
    type: object
  pkg.HTTPError:
    properties:
      code:
        type: string
      entityType:
        type: string
      err: {}
      message:
        type: string
      title:
        type: string
    type: object
host: localhost:4006
info:
  contact: {}
  description: API documentation for the Fetcher Manager component
  termsOfService: http://swagger.io/terms/
  title: Fetcher Manager API
  version: 1.0.0
paths:
  /v1/fetcher:
    post:
      consumes:
      - application/json
      description: Create a new data extraction job. The request will be validated,
        deduplicated within a 5-minute window, and all referenced connections will
        be tested before job creation.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Fetcher request payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.FetcherRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Duplicate request - returning existing job
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.FetcherResponse'
        "202":
          description: Job created and queued for processing
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.FetcherResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Create fetcher job
      tags:
      - Fetcher
  /v1/fetcher/{id}:
    get:
      description: Retrieve detailed information about a specific data extraction
        job.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.JobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Get fetcher job
      tags:
      - Fetcher
  /v1/management/connections:
    get:
      description: List connections with pagination and filters.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - default: 0
        description: Page number (default 0)
        in: query
        name: page
        type: integer
      - default: 50
        description: Page size (default 50, max 1000)
        in: query
        name: limit
        type: integer
      - default: desc
        description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: sortOrder
        type: string
      - description: Filter by database type
        enum:
        - ORACLE
        - SQL_SERVER
        - POSTGRESQL
        - MONGODB
        - MYSQL
        in: query
        name: type
        type: string
      - description: Filter by host
        in: query
        name: host
        type: string
      - description: Filter by database name
        in: query
        name: databaseName
        type: string
      - description: Filter by start date (YYYY-MM-DD)
        in: query
        name: startDate
        type: string
      - description: Filter by end date (YYYY-MM-DD)
        in: query
        name: endDate
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/Pagination'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.ConnectionResponse'
                  type: array
                limit:
                  type: integer
                page:
                  type: integer
                total:
                  type: integer
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: List connections
      tags:
      - Connections
    post:
      consumes:
      - application/json
      description: Create a new database connection for the organization. ConfigName
        must be unique per organization; password is encrypted and a UUID is generated
        on creation.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Connection payload
        in: body
        name: connection
        required: true
        schema:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.ConnectionInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created connection identifier
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Create connection
      tags:
      - Connections
  /v1/management/connections/{id}:
    delete:
      description: Soft delete a connection when no active jobs are running for it.
        Returns 409 if there is any active job.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Connection ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Deleted connection identifier
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Delete connection
      tags:
      - Connections
    get:
      description: Get connection details by ID for the given organization.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Connection ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.ConnectionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Get connection
      tags:
      - Connections
    patch:
      consumes:
      - application/json
      description: Apply a partial update to a connection. Returns 409 if there is
        any active job.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Connection ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update (partial payload)
        in: body
        name: connection
        required: true
        schema:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.ConnectionInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.ConnectionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Update connection
      tags:
      - Connections
  /v1/management/connections/{id}/test:
    post:
      description: Test the configured connection by establishing and closing a connection.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Connection ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Connection test result
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Test connection
      tags:
      - Connections
  /v1/management/connections/validate-schema:
    post:
      consumes:
      - application/json
      description: Validate that tables and fields referenced in the request exist
        in the configured datasources.
      parameters:
      - description: The authorization token in the 'Bearer access_token' format.
          Only required when auth plugin is enabled.
        in: header
        name: Authorization
        type: string
      - description: Organization ID
        in: header
        name: X-Organization-Id
        required: true
        type: string
      - description: Schema validation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.SchemaValidationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_LerianStudio_fetcher_pkg_model.SchemaValidationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.HTTPError'
      summary: Validate schema
      tags:
      - Connections
swagger: "2.0"
