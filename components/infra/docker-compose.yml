services:
  fetcher-mongodb:
    container_name: fetcher-mongodb
    image: mongo:8
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGO_PORT}", "--eval", "db.runCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - ${MONGO_PORT}:${MONGO_PORT}
    command: mongod --port ${MONGO_PORT}
    volumes:
      - fetcher-mongodb-data:/data/db
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - fetcher-infra-network

  fetcher-rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: fetcher-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - ${RABBITMQ_PORT_HOST}:${RABBITMQ_PORT_HOST}
      - ${RABBITMQ_PORT_AMQP}:${RABBITMQ_PORT_AMQP}
    volumes:
      - ./rabbitmq/etc/definitions.json:/etc/rabbitmq/definitions.json
      - ./rabbitmq/etc/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - fetcher-rabbitmq-data:/var/lib/rabbitmq
      - fetcher-rabbitmq-log:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - fetcher-infra-network
      - plugin-shared-network

  fetcher-seaweedfs-master:
    image: chrislusf/seaweedfs:3.97
    container_name: fetcher-seaweedfs-master
    ports:
      - "${SEAWEEDFS_MASTER_PORT:-9335}:9335"
      - "${SEAWEEDFS_MASTER_UI_PORT:-9336}:9336"
    command: "master -ip=fetcher-seaweedfs-master -port=9335 -mdir=/data"
    volumes:
      - fetcher-seaweedfs-master-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://fetcher-seaweedfs-master:9335/cluster/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - fetcher-infra-network
    restart: always

  fetcher-seaweedfs-volume:
    image: chrislusf/seaweedfs:3.97
    container_name: fetcher-seaweedfs-volume
    ports:
      - "${SEAWEEDFS_VOLUME_PORT:-9081}:9081"
    command: "volume -ip=fetcher-seaweedfs-volume -port=9081 -mserver=fetcher-seaweedfs-master:9335 -dir=/data -max=0"
    volumes:
      - fetcher-seaweedfs-volume-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://fetcher-seaweedfs-volume:9081/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - fetcher-infra-network
    depends_on:
      fetcher-seaweedfs-master:
        condition: service_healthy
    restart: always

  fetcher-seaweedfs-filer:
    image: chrislusf/seaweedfs:3.97
    container_name: fetcher-seaweedfs-filer
    ports:
      - "${SEAWEEDFS_FILER_PORT:-8889}:8889"
      - "${SEAWEEDFS_FILER_S3_PORT:-8334}:8334"
    command: "filer -ip=fetcher-seaweedfs-filer -port=8889 -master=fetcher-seaweedfs-master:9335"
    volumes:
      - fetcher-seaweedfs-filer-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://fetcher-seaweedfs-filer:8889/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - fetcher-infra-network
    depends_on:
      fetcher-seaweedfs-master:
        condition: service_healthy
      fetcher-seaweedfs-volume:
        condition: service_healthy
    restart: always

  fetcher-keda:
    image: ghcr.io/kedacore/keda:2.16.0
    container_name: fetcher-keda
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - KEDA_OPERATOR_LOG_LEVEL=info
      - KEDA_OPERATOR_RABBITMQ_HOST=fetcher-rabbitmq
      - KEDA_OPERATOR_RABBITMQ_PORT=${RABBITMQ_PORT_AMQP}
      - KEDA_OPERATOR_RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER}
      - KEDA_OPERATOR_RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - KEDA_OPERATOR_RABBITMQ_QUEUE=fetcher.extract-external-data.queue
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      fetcher-rabbitmq:
        condition: service_healthy
    networks:
      - fetcher-infra-network

  fetcher-valkey:
    container_name: fetcher-valkey
    image: valkey/valkey:8
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--port", "${REDIS_PORT}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p ${REDIS_PORT} -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    volumes:
      - fetcher-redis-data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - fetcher-infra-network

volumes:
  fetcher-mongodb-data:
  fetcher-seaweedfs-master-data:
  fetcher-seaweedfs-volume-data:
  fetcher-seaweedfs-filer-data:
  fetcher-redis-data:
  fetcher-rabbitmq-data:
  fetcher-rabbitmq-log:


networks:
  fetcher-infra-network:
    name: fetcher-infra-network
    driver: bridge
  plugin-shared-network:
    name: plugin-shared-network
    driver: bridge
